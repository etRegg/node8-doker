version: '3.0'
services: 
 webapp:
        build:
            context: "."
            dockerfile: "node8/Dockerfile"
        hostname: "node1"
        # Volúmenes comentados: el Dockerfile copia los archivos en tiempo de build
        # Si necesitas desarrollo hot-reload, descomenta estas líneas
        # volumes:
        #     -  ./server:/app/servidor:rw
        #     -  ./cliente/app-regg:/app/cliente:rw
        ports:
            - "8080:8080"

        networks:
            webappv2:
                ipv4_address: 192.168.70.44


networks:
  webappv2:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"
    ipam:
      driver: default
      config:
      - subnet: 192.168.70.0/24
        gateway: 192.168.70.1
